<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JourneyGo | Travel & Rentals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
    
    <!-- Navigation -->
    <nav class="bg-white shadow-sm fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="#" class="text-2xl font-bold text-emerald-600 flex items-center gap-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                JourneyGo
            </a>
            <div class="hidden md:flex space-x-6">
                <a href="#cars" class="font-medium text-slate-600 hover:text-emerald-600 transition">Cars</a>
                <a href="#bikes" class="font-medium text-slate-600 hover:text-emerald-600 transition">Bikes</a>
                <a href="#buses" class="font-medium text-slate-600 hover:text-emerald-600 transition">Buses</a>
            </div>
            <a href="#login" class="px-5 py-2 text-emerald-600 border border-emerald-600 rounded-full hover:bg-emerald-50 transition font-medium">Sign In</a>
        </div>
    </nav>

    <!-- Hero -->
    <header class="pt-24 pb-12 md:pt-32 md:pb-20 bg-emerald-900 relative overflow-hidden">
        <img src="../assets/images/travel-thumb.jpg" alt="Travel Vehicles" class="absolute inset-0 w-full h-full object-cover opacity-30 mix-blend-overlay">
        <div class="relative z-10 max-w-7xl mx-auto px-6 text-center">
            <h1 class="text-4xl md:text-6xl font-bold text-white mb-6">Your Journey, Your Way</h1>
            <p class="text-emerald-100 text-lg mb-10 max-w-2xl mx-auto">Rent cars, bikes, autos, or book buses across India with the best rates and seamless experience.</p>
            
            <!-- Search Widget -->
            <div class="bg-white p-2 rounded-full shadow-xl flex flex-col md:flex-row items-center max-w-3xl mx-auto">
                <select class="w-full md:w-auto p-3 outline-none text-slate-700 bg-transparent border-r border-slate-200">
                    <option>Cars</option>
                    <option>Bikes</option>
                    <option>Buses</option>
                    <option>Autos</option>
                </select>
                <input type="text" placeholder="Pick-up Location (e.g. Mumbai)" class="w-full p-3 outline-none flex-1">
                <button class="w-full md:w-auto px-8 py-3 bg-emerald-600 text-white rounded-full font-semibold hover:bg-emerald-700 transition mt-2 md:mt-0">Search</button>
            </div>
        </div>
    </header>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-8 text-center">
        <div class="max-w-7xl mx-auto px-6">
            <p class="text-slate-500 text-sm">&copy; 2026 JourneyGo. Designed and developed by Thosho Tech.</p>
        </div>
    </footer>
</body>
</html>
