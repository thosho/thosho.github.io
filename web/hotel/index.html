<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis Stays | Luxury Resorts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .font-heading { font-family: 'Cinzel', serif; }
        .font-body { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 font-body antialiased">
    
    <!-- Navigation -->
    <nav class="absolute w-full z-50 py-6">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center border-b border-white/20 pb-4">
            <a href="#" class="text-2xl font-heading font-bold text-white tracking-widest">OASIS STAYS</a>
            <div class="hidden md:flex space-x-10">
                <a href="#villas" class="text-white hover:text-stone-300 uppercase tracking-widest text-xs transition">Villas & Suites</a>
                <a href="#experiences" class="text-white hover:text-stone-300 uppercase tracking-widest text-xs transition">Experiences</a>
                <a href="#dining" class="text-white hover:text-stone-300 uppercase tracking-widest text-xs transition">Dining</a>
            </div>
            <a href="#book" class="px-5 py-2 bg-white text-stone-900 hover:bg-stone-200 transition uppercase tracking-widest text-xs font-semibold">Book Now</a>
        </div>
    </nav>

    <!-- Hero -->
    <header class="relative h-[80vh] flex items-center justify-center">
        <div class="absolute inset-0 z-0">
            <img src="../assets/images/hotel-thumb.jpg" alt="Luxury Hotel Resort" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-stone-900 bg-opacity-40"></div>
        </div>
        <div class="relative z-10 text-center px-6 mt-16 w-full max-w-5xl">
            <h1 class="text-5xl md:text-7xl font-heading text-white mb-6">Escape to Paradise</h1>
            <p class="text-lg text-stone-200 mb-10 max-w-xl mx-auto font-light">Experience unmatched luxury and tranquility at our award-winning beachfront resort.</p>
            
            <!-- Booking Widget -->
            <div class="bg-white p-4 rounded shadow-2xl flex flex-col md:flex-row items-center justify-between gap-4 max-w-4xl mx-auto">
                <div class="flex-1 text-left w-full border-b md:border-b-0 md:border-r border-stone-200 p-2">
                    <label class="block text-xs uppercase tracking-widest text-stone-500 mb-1">Check-in</label>
                    <input type="date" class="w-full outline-none font-semibold text-stone-800 bg-transparent">
                </div>
                <div class="flex-1 text-left w-full border-b md:border-b-0 md:border-r border-stone-200 p-2">
                    <label class="block text-xs uppercase tracking-widest text-stone-500 mb-1">Check-out</label>
                    <input type="date" class="w-full outline-none font-semibold text-stone-800 bg-transparent">
                </div>
                <div class="flex-1 text-left w-full p-2">
                    <label class="block text-xs uppercase tracking-widest text-stone-500 mb-1">Guests</label>
                    <select class="w-full outline-none font-semibold text-stone-800 bg-transparent">
                        <option>2 Adults, 0 Children</option>
                        <option>2 Adults, 1 Child</option>
                        <option>2 Adults, 2 Children</option>
                    </select>
                </div>
                <button class="w-full md:w-auto px-8 py-4 bg-stone-900 text-white hover:bg-stone-800 transition uppercase tracking-widest text-xs font-semibold">Check Availability</button>
            </div>
        </div>
    </header>

    <!-- Footer -->
    <footer class="bg-stone-900 text-stone-400 py-12 text-center">
        <div class="max-w-4xl mx-auto px-6">
            <h2 class="text-2xl font-heading text-white tracking-widest mb-6">OASIS STAYS</h2>
            <div class="border-t border-stone-800 pt-6 text-xs tracking-widest uppercase">
                <p>&copy; 2026 Oasis Stays. Designed and developed by Thosho Tech.</p>
            </div>
        </div>
    </footer>
</body>
</html>
