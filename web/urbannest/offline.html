<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You're Offline — UrbanNest</title>
    <meta name="theme-color" content="#0D0F14">
    <link rel="stylesheet" href="./css/style.css">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:2rem; }
        .offline-icon { font-size:5rem; margin-bottom:1.5rem; display:block; }
        h1 { font-family:'Playfair Display',serif; font-size:2.2rem; margin-bottom:1rem; color:var(--gold); }
        p { color:var(--text-muted); max-width:420px; margin:0 auto 2rem; line-height:1.8; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div>
        <span class="offline-icon">🏙️</span>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your internet connection. Please reconnect to browse our premium property listings.</p>
        <button onclick="window.location.reload()" class="btn btn-gold">
            <i class="fas fa-rotate-right"></i> Try Again
        </button>
        <br><br>
        <a href="/" class="btn btn-ghost" style="margin-top:0.5rem">
            <i class="fas fa-house"></i> Go Home
        </a>
    </div>
</body>
</html>
