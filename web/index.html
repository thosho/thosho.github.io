<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thosho Tech | Designed Websites Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600&family=Roboto:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #121212;
            --card-color: #1E1E1E;
            --primary-text-color: #E0E0E0;
            --secondary-text-color: #BDBDBD;
            --accent-color: #03A9F4;
            --border-color: #333333;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-text-color);
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'Share Tech Mono', monospace;
            color: var(--accent-color);
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: var(--secondary-text-color);
            font-size: 1.1rem;
            margin-bottom: 50px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background-color: var(--card-color);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-color);
            box-shadow: 0 12px 30px rgba(3, 169, 244, 0.2);
        }

        .thumbnail {
            width: 100%;
            height: 200px;
            object-fit: cover;
            object-position: top;
            border-bottom: 1px solid var(--border-color);
        }

        .content {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .title {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.4rem;
            margin: 0 0 10px 0;
            color: #fff;
        }

        .desc {
            color: var(--secondary-text-color);
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0 0 20px 0;
            flex-grow: 1;
        }

        .link {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'Exo 2', sans-serif;
            transition: color 0.2s ease;
        }

        .link:hover {
            color: #0288D1;
        }

        .loader {
            grid-column: 1 / -1;
            text-align: center;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.5rem;
            color: var(--secondary-text-color);
            padding: 50px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Thosho Tech | Designed Websites</h1>
        <p class="subtitle">An archive of web projects designed and developed by Thosho Tech.</p>
        
        <div id="portfolio-container" class="grid">
            <div class="loader"><i class="fas fa-spinner fa-spin"></i> Loading archive...</div>
        </div>
    </div>

    <script>
        const designedWebsites = [
            "https://clanfit.in",
            "https://moviestory.vercel.app",
            "https://jampictures.in",
            "https://janakikanagaraj.github.io/demo/",
            "https://janakikanagaraj.github.io/in/",
            "https://www.ovor.in/2024/01/about.html",
            "https://tamilreaders.github.io/tamil-library-app/",
            "https://hmsfruits.com"
        ];

        async function fetchPortfolioSites() {
            const container = document.getElementById('portfolio-container');
            if (!container) return;

            container.innerHTML = ''; // Clear loader

            for (const url of designedWebsites) {
                try {
                    const response = await fetch(`https://api.microlink.io?url=${encodeURIComponent(url)}&screenshot=true&meta=true&waitForTimeout=5000`);
                    const data = await response.json();
                    
                    if (data.status === 'success') {
                        const meta = data.data;
                        const title = meta.title || url;
                        const desc = meta.description ? meta.description.substring(0, 120) + '...' : 'Visit the website to learn more.';
                        
                        let img = 'https://via.placeholder.com/600x400/1E1E1E/03A9F4?text=Website+Preview';
                        if (meta.screenshot && meta.screenshot.url) {
                            img = meta.screenshot.url;
                        } else if (meta.image && meta.image.url) {
                            img = meta.image.url;
                        } else if (meta.logo && meta.logo.url) {
                            img = meta.logo.url;
                        }

                        const cardHTML = `
                            <article class="card">
                                <img src="${img}" alt="${title}" class="thumbnail" loading="lazy">
                                <div class="content">
                                    <h3 class="title">${title}</h3>
                                    <p class="desc">${desc}</p>
                                    <a href="${url}" target="_blank" rel="noopener noreferrer" class="link">
                                        Visit Website <i class="fas fa-external-link-alt"></i>
                                    </a>
                                </div>
                            </article>
                        `;
                        container.innerHTML += cardHTML;
                    }
                } catch (error) {
                    console.error('Error fetching preview for:', url, error);
                }
            }
        }

        document.addEventListener('DOMContentLoaded', fetchPortfolioSites);
    </script>
</body>
</html>
